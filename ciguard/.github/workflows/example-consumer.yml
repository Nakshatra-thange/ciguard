name: CI Guard

on:
  workflow_run:
    workflows: ["CI"]      
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: your-name/ci-guard@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          regression-threshold: "15"